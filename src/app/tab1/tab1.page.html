<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      EuGaranto
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">EuGaranto</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="inline">
    <ion-button routerLink="/tabs/tab2">
      <ion-icon slot="start" name="add-circle"></ion-icon>
      Adicionar Produto
    </ion-button>
    <ion-button routerLink="/notificacoes">
      <ion-icon slot="start" name="notifications-sharp"></ion-icon>
      Activar Avisos
    </ion-button>
  </div>

  @for (group of groupedProducts; track group.year) {

    <div class="year-divider">
      <span>{{ group.year }}</span>
      <hr>
    </div>

    @for (p of group.products; track p.id) {
      <ion-card button [routerLink]="['/new-product', p.id]">
        <ion-card-content>
          <div class="card-row">

            <ion-thumbnail slot="start">
              <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
            </ion-thumbnail>

            <div class="card-col">
              <div>
                <ion-card-title>{{ p.nome }}</ion-card-title>
                <ion-card-subtitle>p.categoria</ion-card-subtitle>
              </div>

              <div class="card-footer">
                <div class="card-date">
                  <ion-icon name="calendar-outline"></ion-icon>
                  <ion-label>{{ p.dataCompra | date: 'MMMM yyyy' | uppercase }}</ion-label>
                </div>
                <app-status-badge
                  [dataCompra]="p.dataCompra"
                  [duracaoGarantia]="p.duracaoGarantia"
                />
              </div>
            </div>
          </div>
        </ion-card-content>
      </ion-card>
    }
  }

</ion-content>
