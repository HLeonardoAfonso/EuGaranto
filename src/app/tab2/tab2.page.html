<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Nova Garantia
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Nova Garantia</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="input-container">
    
    <ion-input label="Nome" label-placement="floating" fill="outline" placeholder="Enter text" [(ngModel)]="nome"></ion-input>
    <ion-input label="Marca" label-placement="floating" fill="outline" placeholder="Enter text" [(ngModel)]="marca"></ion-input>
    <ion-input label="Modelo" label-placement="floating" fill="outline" placeholder="Enter text" [(ngModel)]="modelo"></ion-input>
    
    <ion-datetime-button datetime="datetime" label="Data de Compra"></ion-datetime-button>
    <ion-datetime id="datetime" presentation="date" [(ngModel)]="dataCompra"></ion-datetime>
    
    <div class="duration-container">
      <ion-input
        label="Duração"
        label-placement="floating"
        fill="outline"
        [value]="durationValue"
        readonly
        (click)="pickerOpen = true">
      </ion-input>

      <ion-input
        fill="outline"
        [value]="durationUnit"
        readonly
        (click)="pickerOpen = true">
      </ion-input>
    </div>

    <ion-modal [isOpen]="pickerOpen" (didDismiss)="pickerOpen = false">
      <ng-template>
        <ion-header>
          <ion-toolbar>
            <ion-buttons slot="start">
              <ion-button (click)="pickerOpen = false">Cancelar</ion-button>
            </ion-buttons>
            <ion-title>Duração</ion-title>
            <ion-buttons slot="end">
              <ion-button (click)="pickerOpen = false">Confirmar</ion-button>
            </ion-buttons>
          </ion-toolbar>
        </ion-header>
        <ion-picker>
          <ion-picker-column [value]="durationValue" (ionChange)="onUnitChange()">
            <ion-picker-column-option *ngFor="let n of numberOptions" [value]="n">
              {{n}}
            </ion-picker-column-option>
          </ion-picker-column>

          <ion-picker-column [(ngModel)]="durationUnit" (ionChange)="onUnitChange()">
            <ion-picker-column-option value="DIAS">DIAS</ion-picker-column-option>
            <ion-picker-column-option value="MESES">MESES</ion-picker-column-option>
            <ion-picker-column-option value="ANOS">ANOS</ion-picker-column-option>
          </ion-picker-column>
        </ion-picker>
      </ng-template>
    </ion-modal>

    <!-- Image Sections -->
    <div class="image-section">
      <div class="image-block">
        <ion-label class="image-label">Fatura</ion-label>
        @if (fotoFatura) {
          <div class="image-preview">
            <img [src]="fotoFatura" alt="Fatura" />
            <div class="image-actions">
              <ion-button size="small" fill="clear" (click)="tirarFoto('fatura')">
                <ion-icon slot="icon-only" name="camera"></ion-icon>
              </ion-button>
              <ion-button size="small" fill="clear" color="danger" (click)="removerFoto('fatura')">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
        } @else {
          <div class="image-placeholder" (click)="tirarFoto('fatura')">
            <ion-icon name="camera-outline"></ion-icon>
            <span>Adicionar Foto</span>
          </div>
        }
      </div>

      <div class="image-block">
        <ion-label class="image-label">Local</ion-label>
        @if (fotoLocal) {
          <div class="image-preview">
            <img [src]="fotoLocal" alt="Local" />
            <div class="image-actions">
              <ion-button size="small" fill="clear" (click)="tirarFoto('local')">
                <ion-icon slot="icon-only" name="camera"></ion-icon>
              </ion-button>
              <ion-button size="small" fill="clear" color="danger" (click)="removerFoto('local')">
                <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
        } @else {
          <div class="image-placeholder" (click)="tirarFoto('local')">
            <ion-icon name="camera-outline"></ion-icon>
            <span>Adicionar Foto</span>
          </div>
        }
      </div>
    </div>

    <ion-card>
      <ion-card-header>
        <ion-card-title>00 de 0000</ion-card-title>
        <ion-card-subtitle>FIM DA GARANTIA</ion-card-subtitle>
      </ion-card-header>
    </ion-card>

    <ion-button (click)="confirmarRegisto()">
      Confirmar Registo
    </ion-button>
  </div>

</ion-content>
